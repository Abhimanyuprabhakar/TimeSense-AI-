services:
  - type: web
    name: screentime-recorder-api
    env: node
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: node server/server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLIENT_URL
        value: https://client-delta-navy-37.vercel.app
      - key: MONGO_URI
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CALLBACK_URL
        value: https://screentime-recorder.onrender.com/api/auth/google/callback
      - key: AI_PROVIDER
        value: groq
      - key: AI_MODEL
        value: llama-3.3-70b-versatile
      - key: GROQ_API_KEY
        sync: false
